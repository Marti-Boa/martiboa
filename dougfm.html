<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DougFM Radio</title>

<style>
  body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .player {
    width: 340px;
    background: #181818;
    padding: 20px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.7);
  }

  .cover {
    width: 100%;
    height: 260px;
    border-radius: 14px;
    background: #333;
    object-fit: cover;
  }

  .title {
    margin-top: 12px;
    font-size: 18px;
    font-weight: bold;
  }

  .artist {
    font-size: 14px;
    opacity: 0.7;
    margin-top: 4px;
  }

  button {
    margin-top: 14px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: #4caf50;
    color: white;
    cursor: pointer;
    font-size: 14px;
  }

  .live {
    margin-top: 10px;
    font-size: 12px;
    color: #ff3b3b;
  }

  .status {
    margin-top: 6px;
    font-size: 11px;
    opacity: 0.5;
  }
</style>
</head>

<body>

<div class="player">

  <img id="cover" class="cover"
       src="https://via.placeholder.com/300x300?text=Loading" />

  <div class="title" id="title">Loading...</div>
  <div class="artist" id="artist">Please wait</div>

  <audio id="audio">
    <source src="https://icecast.martiboa.co.uk/stream" type="audio/mpeg">
  </audio>

  <button id="playBtn" onclick="togglePlay()">▶ Play</button>

  <div class="live">🔴 LIVE</div>
  <div class="status" id="status">Connecting...</div>

</div>

<script>
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const statusText = document.getElementById("status");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("playBtn");

let isPlaying = false;

// 🎧 Play / Pause toggle (fixed button state)
function togglePlay() {
  if (!isPlaying) {
    audio.play();
    isPlaying = true;
    playBtn.textContent = "⏸ Pause";
  } else {
    audio.pause();
    isPlaying = false;
    playBtn.textContent = "▶ Play";
  }
}

// 🎵 LAST.FM API (album art)
async function getLastFM(track) {
  const apiKey = "022aae8e0665bba795dba68f0aaaeaf6";

  const url = `https://ws.audioscrobbler.com/2.0/?method=track.getinfo&api_key=${apiKey}&artist=&track=${encodeURIComponent(track)}&format=json`;

  try {
    const res = await fetch(url);
    const data = await res.json();

    const image =
      data?.track?.album?.image?.slice(-1)[0]?.["#text"];

    if (image && image.length > 0) {
      cover.src = image;
    }
  } catch (e) {
    // fallback stays
  }
}

// 🎧 Icecast metadata
async function updateMetadata() {
  try {
    const res = await fetch("https://icecast.martiboa.co.uk/status-json.xsl");
    const data = await res.json();

    let source = data.icestats.source;
    if (Array.isArray(source)) source = source[0];

    const nowPlaying =
      source?.metadata?.x_icy_title ||
      source?.playlist?.trackList?.[0]?.title ||
      source?.title ||
      "Unknown Song";

    statusText.textContent = `Listeners: ${source?.listeners ?? 0}`;

    if (nowPlaying.includes("-")) {
      const parts = nowPlaying.split("-");
      artist.textContent = parts[0].trim();
      title.textContent = parts[1].trim();
    } else {
      artist.textContent = "Live Stream";
      title.textContent = nowPlaying;
    }

    // 🎯 Last.fm lookup
    getLastFM(nowPlaying);

  } catch (e) {
    title.textContent = "Radio Online";
    artist.textContent = "Stream Available";
    statusText.textContent = "Metadata offline";
  }
}

updateMetadata();
setInterval(updateMetadata, 5000);
</script>

</body>
</html>
