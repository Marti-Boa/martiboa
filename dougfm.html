<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DougFM Radio</title>

<style>
  body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .player {
    width: 340px;
    background: #181818;
    padding: 20px;
    border-radius: 18px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.7);
  }

  .cover {
    width: 100%;
    height: 260px;
    border-radius: 14px;
    background: #333;
    object-fit: cover;
  }

  .title {
    margin-top: 12px;
    font-size: 18px;
    font-weight: bold;
  }

  .artist {
    font-size: 14px;
    opacity: 0.7;
    margin-top: 4px;
  }

  button {
    margin-top: 14px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: #4caf50;
    color: white;
    cursor: pointer;
    font-size: 14px;
  }

  .live {
    margin-top: 10px;
    font-size: 12px;
    color: #ff3b3b;
    letter-spacing: 1px;
  }

  .status {
    margin-top: 8px;
    font-size: 11px;
    opacity: 0.5;
  }
</style>
</head>

<body>

<div class="player">

  <img id="cover" class="cover"
       src="https://via.placeholder.com/300x300?text=DougFM" />

  <div class="title" id="title">Loading...</div>
  <div class="artist" id="artist">Please wait</div>

  <audio id="audio">
    <source src="https://icecast.martiboa.co.uk/stream" type="audio/mpeg">
  </audio>

  <button onclick="togglePlay()">Play / Pause</button>

  <div class="live">🔴 LIVE</div>
  <div class="status" id="status">Connecting...</div>

</div>

<script>
const audio = document.getElementById("audio");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const statusText = document.getElementById("status");
const cover = document.getElementById("cover");

function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

// 🔥 FIXED METADATA PARSER (based on your Icecast JSON)
async function updateMetadata() {
  try {
    const res = await fetch("https://icecast.martiboa.co.uk/status-json.xsl");
    const data = await res.json();

    let source = data.icestats.source;

    if (Array.isArray(source)) {
      source = source[0];
    }

    const nowPlaying =
      source?.metadata?.x_icy_title ||
      source?.playlist?.trackList?.[0]?.title ||
      source?.title ||
      "Unknown Song";

    if (nowPlaying.includes("-")) {
      const parts = nowPlaying.split("-");
      artist.textContent = parts[0].trim();
      title.textContent = parts[1].trim();
    } else {
      artist.textContent = "Live Stream";
      title.textContent = nowPlaying;
    }

    statusText.textContent = `Listeners: ${source?.listeners ?? 0}`;

    // fallback cover (you can upgrade later with Spotify/Last.fm)
    cover.src = "https://via.placeholder.com/300x300?text=LIVE+RADIO";

  } catch (e) {
    title.textContent = "Radio Online";
    artist.textContent = "Stream Available";
    statusText.textContent = "Metadata unavailable";
  }
}

updateMetadata();
setInterval(updateMetadata, 5000);
</script>

</body>
</html>
