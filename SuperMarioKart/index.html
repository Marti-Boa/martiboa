<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SFC Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 640px;
        }

        #canvas-holder {
            width: 640px;
            height: 480px;
            background-color: #000;
            border: 3px solid #2c2c2c;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        #canvas-holder canvas {
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
        }

        @media (max-width: 660px) {
            #canvas-holder {
                width: 100vw;
                height: 75vw;
                border: none;
                border-radius: 0;
            }
        }

        /* --- Touch Controls CSS --- */
        #touch-controls {
            display: flex !important;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            user-select: none;
            background: #1a1a1a;
            padding: 15px 0;
            border-top: 2px solid #333;
            margin-top: 10px;
        }

        .row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
        }

        .btn {
            background-color: #333;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 0 #1a1a1a;
            user-select: none;
            cursor: pointer;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a1a1a;
            background-color: #444;
        }

        /* D-PAD */
        .dpad {
            position: relative;
            width: 130px;
            height: 130px;
        }
        .dpad-btn {
            position: absolute;
            background: #2b2b2b;
            width: 42px;
            height: 42px;
            border-radius: 5px;
        }
        .dpad-up { top: 0; left: 44px; }
        .dpad-down { bottom: 0; left: 44px; }
        .dpad-left { top: 44px; left: 0; }
        .dpad-right { top: 44px; right: 0; }
        .dpad-center { top: 44px; left: 44px; background: #222; border-radius: 0; }

        /* Action Buttons */
        .action-group {
            position: relative;
            width: 130px;
            height: 130px;
        }
        .abxy {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 18px;
        }
        .btn-y { top: 45px; left: 0; background: #ffcc00; color: #000;}
        .btn-x { top: 0; left: 45px; background: #3399ff; }
        .btn-b { bottom: 0; left: 45px; background: #ff3333; }
        .btn-a { top: 45px; right: 0; background: #00cc66; }

        /* System Buttons (Select / Start) moved to top center */
        .pill-btn {
            background: #333;
            width: 65px;
            height: 25px;
            border-radius: 15px;
            font-size: 11px;
            text-transform: uppercase;
        }

        /* L & R Bumpers */
        .bumper {
            width: 70px;
            height: 35px;
            border-radius: 5px;
            background: #444;
        }
        
        /* Helper class for grouping start/select in center */
        .center-pills {
            display: flex;
            gap: 10px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/nostalgist@latest/dist/nostalgist.umd.js"></script>
</head>
<body>

    <div id="game-wrapper">
        <div id="canvas-holder"></div>
        
        <div id="touch-controls">
            <div class="row">
                <div class="btn bumper" data-key="q">L</div>
                <div class="center-pills">
                    <div class="btn pill-btn" data-key="Shift">Select</div>
                    <div class="btn pill-btn" data-key="Enter">Start</div>
                </div>
                <div class="btn bumper" data-key="w">R</div>
            </div>

            <div class="row">
                <div class="dpad">
                    <div class="btn dpad-btn dpad-up" data-key="ArrowUp">↑</div>
                    <div class="btn dpad-btn dpad-down" data-key="ArrowDown">↓</div>
                    <div class="btn dpad-btn dpad-left" data-key="ArrowLeft">←</div>
                    <div class="btn dpad-btn dpad-right" data-key="ArrowRight">→</div>
                    <div class="dpad-btn dpad-center"></div>
                </div>

                <div class="action-group">
                    <div class="btn abxy btn-x" data-key="s">X</div>
                    <div class="btn abxy btn-y" data-key="a">Y</div>
                    <div class="btn abxy btn-a" data-key="x">A</div>
                    <div class="btn abxy btn-b" data-key="z">B</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ROM_FILENAME = 'super-mario-kart.sfc'; 

        async function initEmulator() {
            try {
                const absoluteRomUrl = new URL(ROM_FILENAME, window.location.href).href;

                await Nostalgist.launch({
                    core: 'snes9x',
                    rom: absoluteRomUrl
                });
                
                const canvas = document.querySelector('canvas');
                if (canvas) {
                    document.getElementById('canvas-holder').appendChild(canvas);
                }

                setupTouchEvents();
            } catch (error) {
                console.error("Failed to load emulator:", error);
                alert("Error loading ROM: " + error.message);
            }
        }

        function setupTouchEvents() {
            const buttons = document.querySelectorAll('.btn');

            buttons.forEach(button => {
                const key = button.getAttribute('data-key');
                if (!key) return;

                // Fire an official keyboard event on touch start
                button.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    window.dispatchEvent(new KeyboardEvent('keydown', {
                        key: key,
                        code: key,
                        bubbles: true,
                        cancelable: true
                    }));
                });

                // Fire an official keyboard event release on touch end
                button.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    window.dispatchEvent(new KeyboardEvent('keyup', {
                        key: key,
                        code: key,
                        bubbles: true,
                        cancelable: true
                    }));
                });
                
                // Backup for dragging finger off the button
                button.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    window.dispatchEvent(new KeyboardEvent('keyup', {
                        key: key,
                        code: key,
                        bubbles: true,
                        cancelable: true
                    }));
                });
            });
        }

        window.addEventListener('DOMContentLoaded', initEmulator);
    </script>
</body>
</html>
