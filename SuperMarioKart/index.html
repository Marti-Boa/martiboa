<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SFC Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 640px;
        }

        #canvas-holder {
            width: 640px;
            height: 480px;
            background-color: #000;
            border: 3px solid #2c2c2c;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        #canvas-holder canvas {
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
        }

        @media (max-width: 660px) {
            #canvas-holder {
                width: 100vw;
                height: 75vw;
                border: none;
                border-radius: 0;
            }
        }

        /* --- Touch Controls CSS --- */
        #touch-controls {
            display: flex !important;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            user-select: none;
            background: #1a1a1a;
            padding: 15px 0;
            border-top: 2px solid #333;
            margin-top: 10px;
        }

        .row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
        }

        .btn {
            background-color: #333;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 0 #1a1a1a;
            user-select: none;
            cursor: pointer;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a1a1a;
            background-color: #444;
        }

        /* D-PAD */
        .dpad {
            position: relative;
            width: 130px;
            height: 130px;
        }
        .dpad-btn {
            position: absolute;
            background: #2b2b2b;
            width: 42px;
            height: 42px;
            border-radius: 5px;
        }
        .dpad-up { top: 0; left: 44px; }
        .dpad-down { bottom: 0; left: 44px; }
        .dpad-left { top: 44px; left: 0; }
        .dpad-right { top: 44px; right: 0; }
        .dpad-center { top: 44px; left: 44px; background: #222; border-radius: 0; }

        /* Action Buttons */
        .action-group {
            position: relative;
            width: 130px;
            height: 130px;
        }
        .abxy {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 18px;
        }
        .btn-y { top: 45px; left: 0; background: #ffcc00; color: #000;}
        .btn-x { top: 0; left: 45px; background: #3399ff; }
        .btn-b { bottom: 0; left: 45px; background: #ff3333; }
        .btn-a { top: 45px; right: 0; background: #00cc66; }

        .pill-btn {
            background: #333;
            width: 65px;
            height: 25px;
            border-radius: 15px;
            font-size: 11px;
            text-transform: uppercase;
        }

        .bumper {
            width: 70px;
            height: 35px;
            border-radius: 5px;
            background: #444;
        }
        
        .center-pills {
            display: flex;
            gap: 10px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/nostalgist@latest/dist/nostalgist.umd.js"></script>
</head>
<body>

    <div id="game-wrapper">
        <div id="canvas-holder"></div>
        
        <div id="touch-controls">
            <div class="row">
                <div class="btn bumper" data-gamepad-index="4">L</div>
                <div class="center-pills">
                    <div class="btn pill-btn" data-gamepad-index="8">Select</div>
                    <div class="btn pill-btn" data-gamepad-index="9">Start</div>
                </div>
                <div class="btn bumper" data-gamepad-index="5">R</div>
            </div>

            <div class="row">
                <div class="dpad">
                    <div class="btn dpad-btn dpad-up" data-gamepad-index="12">↑</div>
                    <div class="btn dpad-btn dpad-down" data-gamepad-index="13">↓</div>
                    <div class="btn dpad-btn dpad-left" data-gamepad-index="14">←</div>
                    <div class="btn dpad-btn dpad-right" data-gamepad-index="15">→</div>
                    <div class="dpad-btn dpad-center"></div>
                </div>

                <div class="action-group">
                    <div class="btn abxy btn-x" data-gamepad-index="3">X</div>
                    <div class="btn abxy btn-y" data-gamepad-index="2">Y</div>
                    <div class="btn abxy btn-a" data-gamepad-index="1">A</div>
                    <div class="btn abxy btn-b" data-gamepad-index="0">B</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ROM_FILENAME = 'super-mario-kart.sfc'; 

        // State storage for our "Phantom Gamepad"
        const virtualGamepadState = {
            buttons: Array(16).fill(0) // Array of 16 buttons defaults to unpressed
        };

        // Trick the browser into thinking a real gamepad is active
        const originalGetGamepads = navigator.getGamepads.bind(navigator);
        navigator.getGamepads = function() {
            const originalArray = originalGetGamepads();
            
            // Generate a synthetic gamepad object adhering to strict Browser specs
            const fakeGamepad = {
                id: "Standard Gamepad (Virtual Touch)",
                index: 0,
                connected: true,
                timestamp: performance.now(),
                mapping: "standard",
                axes: [0, 0, 0, 0],
                buttons: virtualGamepadState.buttons.map(val => ({ pressed: val === 1, value: val }))
            };

            // Return our custom array with the phantom gamepad in the first slot
            return [fakeGamepad, null, null, null];
        };

        async function initEmulator() {
            try {
                const absoluteRomUrl = new URL(ROM_FILENAME, window.location.href).href;

                // Dispatch event so the emulator listens to the phantom controller immediately
                window.dispatchEvent(new Event('gamepadconnected'));

                await Nostalgist.launch({
                    core: 'snes9x',
                    rom: absoluteRomUrl
                });
                
                const canvas = document.querySelector('canvas');
                if (canvas) {
                    document.getElementById('canvas-holder').appendChild(canvas);
                }

                setupTouchEvents();
            } catch (error) {
                console.error("Failed to load emulator:", error);
                alert("Error loading ROM: " + error.message);
            }
        }

        function setupTouchEvents() {
            const buttons = document.querySelectorAll('.btn');

            buttons.forEach(button => {
                const indexStr = button.getAttribute('data-gamepad-index');
                if (!indexStr) return;
                const index = parseInt(indexStr);

                // Hold down touch flip active bit
                button.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    virtualGamepadState.buttons[index] = 1;
                });

                // Release touch resets bit
                button.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    virtualGamepadState.buttons[index] = 0;
                });
                
                // Backup for dragging finger off the button
                button.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    virtualGamepadState.buttons[index] = 0;
                });
            });
        }

        window.addEventListener('DOMContentLoaded', initEmulator);
    </script>
</body>
</html>
